<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      width: 200px;
      height: 200px;
      background-color: red;
    }

    .box1 {
      width: 300px;
      height: 300px;
      margin: 0 auto;
      border: 3px solid black;
      background-color: rgb(212, 74, 212);
    }

    .active {
      width: 200px;
      height: 200px;
      background-color: pink;
      color: #333;
    }
  </style>
</head>

<body>
  <div class="box">文字</div>
  <script>
    // const box = document.querySelector('.box');
    // box.style.width = '300px';
    // //使用小驼峰命名法
    // box.style.backgroundColor = 'blue';
    // box.style.borderTop = '5px solid green';
    // const div = document.querySelector('div');
    // div.className = 'box1'; //修改元素的class属性值 覆盖原有的class属性值
    const box = document.querySelector('.box');
    box.classList.add('active'); //添加一个class属性值 不会覆盖原有的class属性值
    box.classList.remove('active'); //移除一个class属性值
    box.classList.toggle('active'); //切换一个class属性值
  </script>
</body>

</html>
