<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    function fn() {
      console.log('一秒执行一次');
    }
    let n = setInterval(fn, 1000);
    // 取消定时器
    clearInterval(n);
    // n = setTimeout(fn, 1000);
    let i = 0;
    setInterval(function () {
      i++;
      document.write(i);
    }, 1000);
  </script>
</body>

</html>
