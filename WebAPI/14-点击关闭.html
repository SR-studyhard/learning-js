<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      width: 600px;
      height: 300px;
      background-color: pink;
      margin: 100px auto;
      position: relative;
      font-weight: 700;
      font-size: 40px;
      text-align: center;
      line-height: 300px;
    }

    .close {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 4px;
      /* 使鼠标悬停在元素上时显示为指针，提示用户该元素可点击 */
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="box">
    我是广告
    <div class="close">X</div>
  </div>
  <script>
    const closeBtn = document.querySelector('.close');
    const box = document.querySelector('.box');
    closeBtn.addEventListener('click', function () {
      // 点击关闭按钮时，隐藏广告
      box.style.display = 'none';
    });
  </script>
</body>

</html>
