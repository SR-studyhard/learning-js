<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    h2 {
      text-align: center;
    }

    /* 合并边框 */
    table {
      border-collapse: collapse;
    }

    table,
    th,
    td {
      margin: 0 auto;
      border: 1px solid #000;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>

<body>
  <h2>订单确认</h2>

  <script>
    // 1.用户输入
    let price = +prompt('请输入商品价格');
    let num = +prompt('请输入商品数量');
    let address = prompt('请输入收货地址');
    // 2.计算总价
    let total = price * num;
    // 3.页面打印渲染
    document.write(`
      <table>
        <tr>
          <th>商品名称</th>
          <th>商品价格</th>
          <th>商品数量</th>
          <th>总价</th>
          <th>收货地址</th>
        </tr>
        <tr>
          <td>小米手机青春PLUS</td>
          <td>${price}</td>
          <td>${num}</td>
          <td>${total}</td>
          <td>${address}</td>
        </tr >
      </table >
    `)
  </script>
</body>

</html>
